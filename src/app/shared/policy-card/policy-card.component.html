<div class="policy-card">
  <div class="policy-card-icon">
    <i class="fa-solid" [ngClass]="policy.icon"></i>
  </div>
  <div class="policy-card-info">
      <div class="policy-card-info-name">
        {{policy.name}}
      </div>
      <div class="policy-card-info-description">
        {{policy.description}}
      </div>
  </div>
</div>
